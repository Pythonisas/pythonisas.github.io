{{ define "main" }}
	<main>
		{{ with .Site.GetPage "/pages/inicio" }}
			{{ .Content }}
		{{ end }}

		{{ $posts := where .Site.RegularPages "Type" "posts" }}
		{{ with $posts }}
		<h2 id="blogposts">Blogposts</h2>
		<ul>
			{{ range sort . "Date" "asc" }}
			<li>{{ .Date.Format "Jan 2, 2006" }} — <a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
			{{ end }}
		</ul>
		{{ end }}
	</main>
{{ end }}
