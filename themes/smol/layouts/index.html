{{ define "main" }}
	<main>
		{{ with .Site.GetPage "/pages/inicio" }}
			{{ .Content }}
		{{ end }}
		<hr>
		{{ $paginator := .Paginate (where .Site.RegularPages "Type" "in" .Site.Params.mainSections) }}
		{{ range $paginator.Pages }}
			{{ .Render "summary" }}
		{{ end }}
		{{ partial "pagination.html" . }}
	</main>
{{ end }}
